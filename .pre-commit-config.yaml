# .pre-commit-config.yaml — hooks that catch problems before they reach CI.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # public_data/ parquet is intentional committed data (~0.6 MB and growing
        # slowly); the guard still catches accidental multi-MB additions.
        args: ["--maxkb=5000"]
      - id: detect-private-key
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
