# =============================================================================
# OPEN DATA & NEWS SOURCE REGISTRY
# Sovereign debt / currency / bond-market monitor — South & Central Asia,
# China's sphere of influence, and the major economies that shape them.
#
# Purpose: single canonical record of FREE / OPEN sources. Drives (1) ingestion
# config and (2) the dashboard. Also serves as the data-licensing register.
#
# Field schema (per source):
#   id            : stable slug used in code/config
#   name          : human-readable name
#   layer         : news | quant            (which ingestion pattern it feeds)
#   category      : domain grouping
#   provides      : what you actually get
#   access        : api | rss | sdmx | bulk_csv | scrape
#   endpoint      : canonical base URL (VERIFY exact path before wiring — endpoints rot)
#   auth          : none | free_key | apply | registration
#   cadence       : suggested poll/pull frequency
#   redistribution: open | attribution | link_only | restricted
#                   (open=re-publishable; attribution=cite source; link_only=store
#                    metadata+link+your own summary, NOT full text; restricted=view/
#                    derive only, do not re-host the dataset)
#   theme_tags    : quick filters for the dashboard
#   notes         : caveats, keys, gotchas
#
# meta.last_reviewed: 2026-07-09  (re-verify endpoints quarterly)
# =============================================================================

meta:
  schema_version: 1
  last_reviewed: 2026-07-09
  review_cadence: quarterly
  principles:
    - "Free/open only. Paywalled sources (Bloomberg Data License, SWFI, Global SWF) are excluded by design."
    - "For news: store metadata + link + your own summary. Never store or republish full article bodies."
    - "Spreads: no free EMBI/CEMBI exists. Use FRED ICE BofA EM OAS as the index proxy and EM bond-ETF prices for movement, and SAY SO in methodology."
    - "Keep this file as the single source of truth; export to CSV/JSON for the dashboard as needed."

# -----------------------------------------------------------------------------
# NEWS & EVENT MONITORING LAYER (polled through the week, feeds commentary)
# -----------------------------------------------------------------------------
sources:

  - id: gdelt
    name: GDELT 2.0 (Events + Global Knowledge Graph)
    layer: news
    category: global_event_monitoring
    provides: Global news events, entities, themes, tone; updated ~every 15 min across thousands of outlets and languages
    access: api
    endpoint: https://api.gdeltproject.org/api/v2/doc/doc
    auth: none
    cadence: 15min-hourly
    redistribution: open          # GDELT data tables are open; underlying article text is NOT
    theme_tags: [empire, war, culture, sovereign, fx]
    notes: >
      Monitoring backbone — sidesteps single-publisher RSS limits. Store
      GDELT-derived fields freely; do not re-host the source articles' text.
      TRANSPORT 2026-07-10: the DOC API 429s every request from every IP/user-agent
      we tested (local + CI runners, exponential backoff exhausted), so ingestion
      runs on the raw 15-minute bulk export files (data.gdeltproject.org — plain
      downloads, no rate limit, includes tone). The DOC API query plan is kept in
      config/feeds.yaml (mode: doc) for whenever it recovers.

  - id: bloomberg_rss
    name: Bloomberg public RSS (Markets, Businessweek)
    layer: news
    category: markets_news
    provides: Headlines + links for markets and Businessweek
    access: rss
    endpoint: https://feeds.bloomberg.com/markets/news.rss
    auth: none
    cadence: hourly
    redistribution: link_only
    theme_tags: [bonds, fx, commodities]
    notes: "Also /businessweek/news.rss. Verified live 2026. Headlines/links only — paid Data License is a separate product you do NOT need."

  - id: reuters_via_gnews
    name: Reuters (via Google News RSS query)
    layer: news
    category: markets_news
    provides: Reuters articles from last 24h as a generated feed
    access: rss
    endpoint: "https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com&hl=en-US&gl=US&ceid=US:en"
    auth: none
    cadence: hourly
    redistribution: link_only
    theme_tags: [bonds, fx, war, empire]
    notes: >
      BROKEN, verified 2026-07-09: Google News allinurl:/site: domain-scoped queries
      now return zero items, so this workaround is dead. Source disabled (no adapter);
      Reuters coverage arrives via GDELT until a new workaround is found.

  - id: occrp
    name: OCCRP (Organized Crime & Corruption Reporting Project)
    layer: news
    category: investigations
    provides: Investigations on corruption, sanctions, kleptocracy, money laundering, power & influence
    access: rss
    endpoint: https://www.occrp.org/en/feed
    auth: none
    cadence: daily
    redistribution: link_only
    theme_tags: [empire, culture, sanctions]
    notes: >
      Endpoint corrected 2026-07-09: /en/rss-listing is an HTML page; /en/feed is the
      live RSS. Per-beat feeds (Sanctions, Power and Influence, Money Laundering,
      Kleptocracy) can be added in config/feeds.yaml when verified.

  - id: regional_geopolitics
    name: Regional / geopolitics outlets
    layer: news
    category: regional_analysis
    provides: Asia-focused analysis (The Diplomat, Nikkei Asia, Dawn, etc.)
    access: rss
    endpoint: https://thediplomat.com/feed/
    auth: none
    cadence: daily
    redistribution: link_only
    theme_tags: [empire, war, culture]
    notes: "Add Nikkei Asia, Dawn (Pakistan), and other regional outlets. Verify each native feed; fall back to the Google News query trick where dead."

  - id: central_banks_rss
    name: National central bank press feeds
    layer: news
    category: policy
    provides: Rate decisions, statements, FX interventions
    access: rss
    endpoint: https://rbi.org.in/pressreleases_rss.xml
    auth: none
    cadence: daily
    redistribution: link_only
    theme_tags: [fx, sovereign]
    notes: >
      Feed list lives in config/feeds.yaml. Verified 2026-07-09: RBI native RSS works;
      SBP (Pakistan) is bot-walled (403) to plain HTTP clients. Other banks pending
      per-bank verification before being added.

  - id: igo_press_rss
    name: IMF / World Bank / ADB / BIS press & research feeds
    layer: news
    category: institutional
    provides: Program news, debt-sustainability analyses, reviews, research
    access: rss
    endpoint: https://feeds.feedburner.com/adb_news
    auth: none
    cadence: daily
    redistribution: link_only
    theme_tags: [sovereign, empire]
    notes: >
      Feed list lives in config/feeds.yaml. Verified 2026-07-09: ADB via FeedBurner
      works; IMF and BIS press feeds are dead or bot-walled (403/404), World Bank news
      RSS is 404. IMF/WB program news arrives via GDELT until native feeds return.

# -----------------------------------------------------------------------------
# QUANTITATIVE LAYER — markets / prices
# -----------------------------------------------------------------------------

  - id: fred
    name: FRED (St. Louis Fed)
    layer: quant
    category: markets_rates_spreads
    provides: USD index, oil (WTI/Brent), VIX, US Treasury curve, ICE BofA EM OAS spread indices (e.g. BAMLEMCBPIOAS)
    access: api
    endpoint: https://api.stlouisfed.org/fred
    auth: free_key
    cadence: daily
    redistribution: restricted     # ICE BofA index series: free to view/derive, redistribution restricted
    theme_tags: [bonds, fx, commodities]
    notes: "EM OAS series = your free spread proxy (no free EMBI exists). NOTE: ICE BofA series carry redistribution restrictions — chart/derive, don't re-host the raw series."

  - id: frankfurter
    name: Frankfurter / exchangerate.host (ECB-based FX)
    layer: quant
    category: fx
    provides: Daily FX rates (majors + some EM), historical and latest
    access: api
    endpoint: https://api.frankfurter.dev/v1
    auth: none
    cadence: daily
    redistribution: open
    theme_tags: [fx]
    notes: >
      ECB reference rates. Good for majors; EM coverage limited — supplement with
      central-bank and IMF rates. Endpoint updated 2026-07-09: api.frankfurter.app
      now 301-redirects to api.frankfurter.dev/v1.

  - id: yfinance
    name: Yahoo Finance (via yfinance)
    layer: quant
    category: markets_prices
    provides: FX pairs, EM bond ETFs (EMB, EMLC, EMHY), equity indices
    access: scrape
    endpoint: https://pypi.org/project/yfinance/
    auth: none
    cadence: daily
    redistribution: restricted
    theme_tags: [bonds, fx]
    notes: "Unofficial; respect Yahoo ToS; treat as best-effort, NOT a redistributable dataset. Use for movement/levels, not for re-hosting."

  - id: wb_pinksheet
    name: World Bank Commodity Markets (Pink Sheet)
    layer: quant
    category: commodities
    provides: Monthly commodity price series
    access: bulk_csv
    endpoint: https://www.worldbank.org/en/research/commodity-markets
    auth: none
    cadence: monthly
    redistribution: attribution
    theme_tags: [commodities]
    notes: "CSV/XLSX download (CMO 'Pink Sheet')."

  - id: eia
    name: U.S. EIA (energy)
    layer: quant
    category: commodities
    provides: Oil/energy price and supply series
    access: api
    endpoint: https://api.eia.gov
    auth: free_key
    cadence: daily
    redistribution: open
    theme_tags: [commodities, war]
    notes: "Free key. Useful for oil shocks tied to conflict narratives."

# -----------------------------------------------------------------------------
# QUANTITATIVE LAYER — macro & external debt
# -----------------------------------------------------------------------------

  - id: imf
    name: IMF (WEO, IFS, lending arrangements, DSAs)
    layer: quant
    category: macro_debt
    provides: Growth, reserves, exchange rates, program status, debt-sustainability analyses
    access: sdmx
    endpoint: https://api.imf.org/external/sdmx/2.1
    auth: none
    cadence: monthly
    redistribution: attribution
    theme_tags: [sovereign, fx, empire]
    notes: >
      Endpoint verified 2026-07-09: new IMF data portal SDMX 2.1 API (sdmx1 source
      IMF_DATA). Legacy dataservices.imf.org is dead and IFS was decommissioned —
      flows are renamed (IRFCL reserves, ER exchange rates, BOP, COFER). IRFCL
      coverage is per-country (IND/KAZ report; PAK does not). Lending-arrangement +
      DSA data still needs a wiring plan.

  - id: worldbank_wdi
    name: World Bank WDI
    layer: quant
    category: macro
    provides: Broad macro/development indicators
    access: api
    endpoint: https://api.worldbank.org/v2
    auth: none
    cadence: monthly
    redistribution: attribution
    theme_tags: [sovereign, culture]
    notes: "Clean REST API, no key."

  - id: worldbank_ids
    name: World Bank International Debt Statistics (IDS)
    layer: quant
    category: external_debt
    provides: External debt by creditor, including bilateral exposure to China
    access: api
    endpoint: https://api.worldbank.org/v2
    auth: none
    cadence: quarterly
    redistribution: attribution
    theme_tags: [sovereign, empire]
    notes: "Gold for the China-sphere theme — creditor breakdowns. Served via the World Bank API (IDS source)."

  - id: bis
    name: Bank for International Settlements (BIS)
    layer: quant
    category: macro_rates
    provides: Effective exchange rates, credit, debt securities statistics
    access: sdmx
    endpoint: https://data.bis.org
    auth: none
    cadence: monthly
    redistribution: attribution
    theme_tags: [fx, bonds]
    notes: "SDMX/CSV. Effective exchange rates useful for FX-stress signals."

