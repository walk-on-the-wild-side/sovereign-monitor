# ingest_market_news.yml — daily pull of market and news sources (SPEC stage B1).
# The runner is ephemeral: it seeds its store from committed public_data/, ingests,
# validates, and commits the refreshed re-publishable subset back. Restricted raw
# values (FRED ICE BofA, yfinance) exist only inside the run and are never committed.
name: ingest-market-news

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          # Pinned: the unpinned action falls back to whatever uv is newest,
          # which makes scheduled runs non-reproducible.
          version: "0.11.28"
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked
      # Seed -> ingest -> validate -> export -> commit -> push, retried once from
      # a clean checkout if the push is rejected. Despite the shared concurrency
      # group correctly serializing this workflow after ingest-macro, a manual
      # back-to-back dispatch of both can still hit a push rejected "fetch first"
      # (observed 2026-07-11): our checkout landed on a GitHub git-backend replica
      # that hadn't yet caught up with the sibling job's just-pushed commit.
      # Ingestion is idempotent, so redoing it against the freshly reset main is
      # always safe and avoids any risk of overwriting the sibling's new rows.
      #
      # One flaky source must not discard the others: every source runs, healthy
      # batches land and get committed, and the final step turns any failure into
      # a red run so endpoint rot stays loud.
      - name: Ingest, validate, export, and commit
        id: ingest
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2; do
            rm -rf data
            uv run python -m sovereign_monitor seed-public

            failed=""
            for source in bloomberg_rss occrp central_banks_rss igo_press_rss gdelt \
                          fred frankfurter yfinance; do
              echo "::group::ingest $source (attempt $attempt)"
              uv run python -m sovereign_monitor ingest --source "$source" || failed="$failed $source"
              echo "::endgroup::"
            done
            echo "failed=$failed" >> "$GITHUB_OUTPUT"

            uv run python -m sovereign_monitor validate
            uv run python -m sovereign_monitor export-public
            uv run python -m sovereign_monitor build-index

            git add public_data dashboard_export
            if git diff --staged --quiet; then
              exit 0
            fi
            git commit -m "Data: daily market/news ingest $(date -u +%F)"
            if git push; then
              exit 0
            fi

            echo "::warning::push rejected on attempt $attempt; resetting to latest main and retrying"
            git fetch origin main
            git reset --hard origin/main
          done
          echo "sovereign-monitor: push still rejected after retries" >&2
          exit 1
      - name: Fail the run if any source failed
        if: steps.ingest.outputs.failed != ''
        env:
          FAILED: ${{ steps.ingest.outputs.failed }}
        run: |
          echo "sovereign-monitor: sources failed:$FAILED" >&2
          exit 1
