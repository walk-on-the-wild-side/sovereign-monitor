# ingest_macro.yml — weekly pull of slow-moving macro/debt sources (SPEC stage B1).
# Same seed → ingest → validate → export → commit shape as the daily workflow.
# ND-GAIN and AidData are on_release sources: run manually, never scheduled.
name: ingest-macro

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked
      # Same retry-on-push-rejection shape as ingest-market-news.yml — see that
      # file's comment for why. worldbank_wdi in particular disconnects mid-request
      # often enough that it's the expected occasional failure here (also mitigated
      # by get_with_retry in the adapter itself); one flaky source must not discard
      # the others.
      - name: Ingest, validate, export, and commit
        id: ingest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2; do
            rm -rf data
            uv run python -m sovereign_monitor seed-public

            failed=""
            for source in worldbank_wdi worldbank_ids imf; do
              echo "::group::ingest $source (attempt $attempt)"
              uv run python -m sovereign_monitor ingest --source "$source" || failed="$failed $source"
              echo "::endgroup::"
            done
            echo "failed=$failed" >> "$GITHUB_OUTPUT"

            uv run python -m sovereign_monitor validate
            uv run python -m sovereign_monitor export-public

            git add public_data
            if git diff --staged --quiet; then
              exit 0
            fi
            git commit -m "Data: weekly macro ingest $(date -u +%F)"
            if git push; then
              exit 0
            fi

            echo "::warning::push rejected on attempt $attempt; resetting to latest main and retrying"
            git fetch origin main
            git reset --hard origin/main
          done
          echo "sovereign-monitor: push still rejected after retries" >&2
          exit 1
      - name: Fail the run if any source failed
        if: steps.ingest.outputs.failed != ''
        env:
          FAILED: ${{ steps.ingest.outputs.failed }}
        run: |
          echo "sovereign-monitor: sources failed:$FAILED" >&2
          exit 1
