# ci.yml — lint, type-check, and test on every push and pull request.
# No live network calls here: adapter tests replay recorded fixtures only (SPEC.md).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          # Pinned: the unpinned action falls back to whatever uv is newest,
          # which makes scheduled runs non-reproducible.
          version: "0.11.28"
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest
