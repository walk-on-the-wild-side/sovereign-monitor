# stress_events.yaml — hand-curated reference list of sovereign-stress events for
# the twelve scored countries, 2000-present (SPEC stage B3). This is the ground
# truth the signal backtest is evaluated against; it is a judgment call by the
# editor, not a machine output, and it errs toward well-documented events.
#
# Schema per event:
#   country_iso3 : scored-country code
#   date         : event date (day precision where documented; precision: month
#                  means the day is a placement within a documented month, which
#                  the backtest's 30/90-day tolerance windows absorb)
#   type         : default | imf_program | currency_crisis | reserve_stress | banking_crisis
#   description  : one line, our own words
#   citation     : institution/outlet + what to search; stable landing page where useful
#
# Editorial rule: every event must be independently verifiable from public
# reporting; nothing here is derived from the monitor's own data.

